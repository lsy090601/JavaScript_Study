<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for each</title>
  </head>
  <body>
    <script>
      let brands = ["애플", "구글", "아마존", "마이크로소프트", "메타"];
      // brands.forEach(function(){})
      brands.forEach(function (brand, index) {
        console.log(index, brand);
      });

      const myScore = [98, 100, 80, 13];
      let total = 0;
      // 선언함수
      myScore.forEach(function (score) {
        total += score;
      });
      console.log(total);
      //화살표 함수
      myScore.forEach((score) => {
        total += score;
      });
      console.log(total);

      // 개인 실습
      /*  다음 객체가 존재한다. 사용자가 키를 입력하면

            let person = {
                name: "홍길동",
                number: 2701,
                phone: "010-1111-2222",
                address: "서울시 관악구 ",
            };

        ① 입력값이 없는 경우 : "키를 입력해야 동작합니다. "라는 메시지 출력

        ② 존재하지 않는 키를 입력하는 경우 : “존재하지 않는 키입니다.” 라는 메시지 출력

        ③ 힌트 : 함수를 이용하면 작업이 좀 더 편안할 수 있습니다.
        
        ④ 조건 : 함수(선언)를 이용하면 작업이 좀 더 편안할 수 있습니다.
                선언함수 function(매개변수){...}를 하나 이상 사용해 보세요.    */
      let person = {
        name: "홍길동",
        number: 2701,
        phone: "010-1111-2222",
        address: "서울시 관악구",
        score: [10, 20, 30, 40, 50],
      };

      let userInput = prompt("보고 싶은 정보를 입력하세요 : ");
      let total2 = 0;
      let found = false;

      if (!userInput) {
        console.log("키를 입력해야 동작합니다");
      } else {
        for (const key in person) {
          //for~in문
          if (userInput === key) {
            found = true;
            console.log(key, ":", person[key]);
          }
        }
        if (!found) {
          console.log("존재하지 않는 키입니다");
        }

        person.score.forEach(function (value) {
          //forEach문 > score 배열의 각 요소에 대해 합계 계산
          total2 += value;
        });
        console.log("합계:", total2); //합계 출력
        console.log("평균:", total2 / person.score.length); //평균 출력
      }
    </script>
  </body>
</html>
