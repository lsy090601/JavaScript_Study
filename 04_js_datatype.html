<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트데이터타입</title>
</head>
<body>
    <script>
        // 1. 문자열 "" '' -> 팀이 결정하시면 되세요!!!!!!!! 이걸 결정안하면 나중에 혼란스러워짐 실제 '', "" 이걸 나타내야 할 때 중요해질 수 있음

        let name1 = "Mirim"
        let name2 = "Mirim"
        console.log(name1.length);
        //length 파이썬, 자바스크립트는 속성,자바는 함수
        let str1 = "그는 '존'이라고 합니다" 
        console.log(str1) //그는 '존'이라고 합니다

        let str2 = '그는 "존"이라고 합니다'
        console.log(str2) //그는 "존"이라고 합니다

        let str3 = "그는 \"존\"이라고 합니다"
        // Unexpected identifier '존' (at 04_js_datatype.html:20:25) 오류 떠서 해결하기 위해서
        // 이스케이프(escape) 문자로 해결
        console.log(str3)

         //연산 : +
        let firstName = "Jhon ";
        let lastName = "Bacon";
        let fullName = firstName+lastName;
        console.log(fullName);

        /* 2. 숫자(Number)형 객체
        - 정수, 실수 다 표현
        - 다양한 속성(property)과 함수(method)를 지원 
        - 자바스크립트의 숫자는 64비트 부동소수점 방식을 사용한다.

        - 0번 비트: 부호 (0이면 양수, 1이면 음수)
        - 1~11번 비트: 지수부
        - 12~63번 비트: 가수부

            단, 이 방식은 10진수가 아닌 2진수 기반으로 표현되기 때문에
            일부 소수(예: 0.1, 0.2)는 정확하게 표현되지 않고 근사값으로 저장된다.

            이로 인해 계산 시 정밀도 오차가 발생할 수 있다.
        */

        console.log(Number.MAX_SAFE_INTEGER)
        console.log(Number.MAX_VALUE) 
        // 자바 스크립트는 정밀도 오차라는 문제를 가지고 있음

        let a = 3;
        let b = 3.67;
        console.log(a, b);

        // 정밀도 오차 

        let result = 0.1 + 0.2;
        if (result===0.3) {
            console.log("정답")
        }
        else {
            console.log("오답") //오답
        }
        console.log(result) //0.30000000000000004

        //정밀도 오차 해결 방법
        // 1. 정수로 변환
        // 2. 오픈라이브러리 사용 > Big.js, Decimal.js, Bignumber.js 등등...

        /* 정밀도 오차 해결
        1. 정수로 변환 (0.1*10 + 0.2*10) /10
        2. toFixed() : 출력시에 소수점 이하를 잘라주는 메서드 사용
            (0.1+0.2).toFixed(1)
        3. 다양한 오픈 라이브러리 사용 (시험에는 안나옴)

        */
       console.log((0.1*10 + 0.2*10) /10);
       console.log((0.1+0.2).toFixed(1));

       // 3. BooleaN (참, 거짓)
       let inputAge = 17;
       let adultAge = 20;
       let isAult = inputAge >= adultAge;
       console.log(isAult)

       /* 자바스크립트에서 거짓(flase)에 해당하는 값 : 
            1. false
            2. 0
            3. ""
            4. undifined
            5. null
            6. NaN (Not a Number) < 이것도 undifined처럼 개발자의 실수..


            이거 이외에는 모두 true, 참으로 본다!
            */
        let userInput = prompt("이름 : ");
        if (userInput) {
            console.log("Hello") 
        }
        // 입력칸에 공백 한 후 확인을 누르면 flase 가 뜸 > 공백은 flase!
        


       /* 4. undefined(매우 중요)
       - 다른 언어에서 사용하지 않는 데이터 타입이자 데이터 값
       - 개발자 실수 : 선언은 하는데, 할당을 안한 경우
       - 실행시간에 브러우저 엔진이 undefined 할당 => 전체 stop 방지
       - 정의되지 않은, 할당하지 않은 이라는 의미


       프로그램 전체가 stop 되는걸 막으려고 브라우저 엔지니어가 undefined 할당
       */

       let x;
       console.log(x); //undefined

       /* 5. null
       - 없음을 의미
       - undefined가 개발자 실수에 나타는 값에 비해서, null은 개발자가 의도적으로 할당
       - 변수를 선언하는 시점에 데이터 타입이나 값을 결정하지 못한 경우
            ㄴ undefined를 피하는 전략, 초기화와 비슷한 의미
       - garbage collection : 메모리 효율을 위해 더 이상 사용하지 않는 메모리를 해제
            ㄴ 자바는 자동으로 가비지 컬렉션을 해주지만 
            자바스크립트에서는 의도적으로 해야함

            예 ) JSON에서 5천명의 전화번호를 가져올 때, 
            RAM에 엄청 많게 데이터를 저장하고 있을 것임..(주소 예로 01ca)
            let telephone = data;
            그걸 data라는 변수에 JSON 파일을 사용하고 남으면 5천개의 데이터들이
            사용되지 못하고 가만히 잇어 데이터를 쓸모없이 많이 들고있어야함
            이런 데이터 사용을 하지 않기 위해서
            telephone = null;
            이라고 직접 가비지 컬렉션을 해주는 거임! */

        let y = "굉장히 큰 Json 데이터";
        console.log(y); //굉장히 큰 Json 데이터
        y = null;
        console.log(y); //null

        




    </script>
</body>
</html>
