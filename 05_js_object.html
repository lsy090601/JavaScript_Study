<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오브젝트</title>
</head>
<body>
    <script>
        /* 객체(object) 
        - 파이썬의 딕셔너리와 유사
        - 관련있는 데이터를 하나로 담을 수 있는 자료 타입
        - {} 사용
        - {키(key) : 값(vlaue), 키 : 값 .....}
        - 파이썬은 key에 숫자가 올 수 있지만, 자바스크립트는 불가!
        - 값(value) : 문자, 숫자, 배열, boolean, 객체, 함수 ... <- 제한이 없다!
        - 키(key) : 고유한 값 ==> 에러가 발생하진 않지만, 덮어쓰기 됨! 
        - 그걸 제외하고는 거의 사용방법이 비슷
        - 굳이 숫자 쓰고 싶으면 "" 사용해서 문자열화 시켜야함
        - 관리가 쉽다 =>  생성 후 수정, 추가, 삭제 등이 용이
        - 원래는 순서를 보장하지 않음 => ES6 이후 보장 노력 < 이해 필요 */

        // 1. 객체의 작성 : 관련 있는 정보를 하나로 묶어서 사용하고 싶은 경우
        let student = {
            name : "이서영", //아무개로 덮여져서 나옴
            phone : "010-7317-3118",
            email : "s2527@e-mirim.hs.kr",
            address : "대구광역시 북구 칠곡중앙대로 598",
            name : "아무개" //아무개로 나옴 ==> key 이름 중복사용하지 않기!! ==> key는 고유해야한다
        } 

        console.log(student) //object 토글 후 student 안에 들어있는 자료들 나옴
        console.log(typeof(student)) //object

        let numbers = {
             1 : "1111",
             2 : "2222",
             3 : "3333"
        }
        console.log(numbers) //{1: '1111', 2: '2222', 3: '3333'} 토글 후 numbers 안에 들어있는 자료들 나옴
        // 2. object의 키값을 읽어오기 : Object.key()
        let keys = Object.keys(numbers)
        console.log(keys) //(3) ['1', '2', '3']
        console.log(typeof(keys)) //object < 오브젝트로 들고옴, 문자열로 가져옴
        // key값을 숫자가 아닌 문자열로 가지고 옴 + 배열로 가져옴
        console.log(keys[0]) //1 < 배열로 가져옴 숫자 XXXX!!

        // 3. 값(value)에 접근하는 방법 : 객체이름.키
        let name = student.name
        console.log(name) //아무개

        // 변수 스코프(scope) : 변수가 영향을 미치는 범위
        // {}가 있으면 {}안에서만 나타냄, 함수 내에서 선언이라면 함수 안에서만 영향을 미침

        // var는 함수 내 선언.. 이런거 필요없이 전역변수로 var의 scope가 전체 코드가 됨

        let phone = student.phone
        let email = student.email
        let address = student.address

        console.log(phone,email,address) //010-7317-3118 s2527@e-mirim.hs.kr 대구광역시 북구 칠곡중앙대로 598
        // 동일한 이름을 지어도 scope 영향을 미치지 않기 때문에 상관 XX, 이게 더 이해하기 편하고 좋음!
        
        // 4. 값을 수정하는 방법 
        student.phone = "010-1004-1004"
        console.log(student.phone) //010-1004-1004

        // 5. 객체에 새로운 키와 값을 추가
        // 내가 혈액형을 넣고 싶으면???? = 새로운 키와 값을 추가하고 싶으면?
        student.bloodType = "AB"
        console.log(student) //{name: '아무개', phone: '010-1004-1004', email: 's2527@e-mirim.hs.kr', address: '대구광역시 북구 칠곡중앙대로 598', bloodType: 'AB'}
        // 순서는 어쩔 수 없음

        // 6. !!! 중요 !!!!! 특정 키에 접근하는 방법
        // 예) 사용자로부터 알고 싶은 키 값, 서영이의 name,phone,address의 데이터가 있는데 개발자는 name 데이터를 가져오고 싶었는데 
        // name 키가 정해져 있지 않은 경우엔 어떻게?
        console.log(student.name) // 이름을 알 경우엔 이렇게 접근
        console.log(student["name"]) // <==== 이렇게 이름 모를 때 사용

        let userInput = prompt("알고 싶은 값은 무엇인가요?(name, phone, email, address, bloodtype)")
        // (name, phone, email, address, bloodtype) <- 사용자 편의를 위해서 그냥 적은거임 역할 X
        // console.log(userInput)
        console.log(student[userInput]) //이런식으로 하면 될 일!!!1

        // 7. 정의되지 않은 키 값에 접근하고자 할 경우 = > undefined가 출력됨
        // => 개발자는 undefined가 뜨게 하면 안되기에 디테일하게 다 에러처리를 해야한당
    
    </script>
</body>
</html>
