    <title>데이터 타입</title>

<body>
    <script>
        /* 배열
        - 하나 이상의 데이터를 담을 수 있다.
        - 어떤 데이터도 담을 수 있다 
        - 어떤 데이터도 함께!!! 담을 수 있다
        - 배열은 선언하는 순간 브라우저 엔지니어가 length 속성을 만들어준다
        - length property */
        let nums = [1,2,3,4,5]
        let str = ["a","b","c"]
        let mix = [1, 3.5, "abc", true, [3,4,5],{name : "이서영"}]
        console.log(nums)
        console.log(str)
        console.log(mix)

        // 1. proprety 속성
        let a=[]
        console.log(a.length)

        // 2. 베열에 접근 : 인덱스 
        // 3. 순서가 정해져있다. => 고정이 되어있음, 삭제가 조금 어려울 수도 있음
        // => 삭제, 삽입이 용이하지 않다

        // 4. 내장함수 (pop(),push())
        console.log(mix.pop())
        console.log(mix)
        console.log(mix.pop())
        console.log(mix)
        // 매개변수 : 함수 실행에 필요한 전달값
        // pop()은 매개변수가 있을 필요 없이 그냥 가장 마지막껄 꺼냄

        mix.push({name : "권초현"})
        console.log(mix)

        // ex) 우리가 개발한 앱에서 사용자 목록을 가져와 처리를 한다고 가정,
